<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Rock Paper</title>
</head>
<body>
    <div class="welcome">
        <h1>Welcome to the Rock Paper Scissors Game</h1>
        <p>There will be 5 rounds. May the best player win!</p>
    </div>
    <div class="playground">
        <button class="choice-btn" data-choice="rock">Rock</button>
        <button class="choice-btn" data-choice="paper">Paper</button>
        <button class="choice-btn" data-choice="scissors">Scissors</button>
    </div>
    <div class="scoreboard">
        <p>Human Score: <span id="human-score">0</span></p>
        <p>Computer Score: <span id="computer-score">0</span></p>
    </div>
    <div class="result">
        <p id="result">Make your choice!</p>
    </div>
    
    <script src="script.js"></script>
    
</body>
</html>
